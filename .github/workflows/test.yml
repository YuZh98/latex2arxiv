name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pytest bibtexparser Pillow ruff
      - run: ruff check .
      - run: pytest tests/ -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build wheel
        run: pip install build && python -m build --wheel
      - name: Verify demo_project.zip is in wheel
        run: unzip -l dist/*.whl | grep demo_project.zip
      - name: Smoke test installed package
        run: |
          pip install dist/*.whl
          latex2arxiv --demo --dry-run

  fixtures-smoke:
    # Lightweight regression net — runs the fixture suite in --dry-run mode
    # and asserts each fixture's summary-table row matches expectations.
    # Catches changes to file pruning, pre-flight checks, and config
    # application without needing TeX Live. The runner gates ANSI colors on
    # `[ -t 1 ]`, so under `tee` the output is plain text and grep works.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install package
        run: pip install .
      - name: Run fixture smoke and assert per-fixture outcomes
        run: |
          set -e
          bash tests/fixtures/run_all.sh | tee /tmp/fixture_out.txt
          grep -F "01-minimal" /tmp/fixture_out.txt | grep -F "✓ clean"
          grep -F "02-biblatex-biber" /tmp/fixture_out.txt | grep -F "1 warning"
          grep -F "03-revision-markup" /tmp/fixture_out.txt | grep -F "✓ clean"
          grep -F "04-multi-documentclass" /tmp/fixture_out.txt | grep -F "✓ clean"
          grep -E "05-pre-flight-warnings.*2 error.*7 warning" /tmp/fixture_out.txt
          grep -F "5 fixtures ran" /tmp/fixture_out.txt

  compile-smoke:
    # Live --compile end-to-end test against real TeX Live + biber. Catches
    # regressions in _compile() that unit tests can't (subprocess interaction,
    # bibtex/biber dispatch, PDF actually produced). Runs only after unit
    # tests pass to fail fast on cheap signals.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install TeX Live + biber
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-bibtex-extra \
            biber
      - name: Install package
        run: pip install .
      - name: Stub xdg-open so the PDF auto-open is a no-op on headless runner
        run: |
          mkdir -p "$HOME/bin"
          printf '#!/bin/sh\nexit 0\n' > "$HOME/bin/xdg-open"
          chmod +x "$HOME/bin/xdg-open"
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Bibtex path — demo project --compile
        run: |
          latex2arxiv --demo --compile
          test -f demo_project_arxiv.pdf
          # PDF must be non-trivially sized — guards against silent compile failure.
          test "$(stat -c%s demo_project_arxiv.pdf)" -gt 10000
      - name: Biber path — biblatex fixture --compile
        run: |
          mkdir -p /tmp/biber-fixture/bib
          cat > /tmp/biber-fixture/main.tex <<'TEX'
          \documentclass{article}
          \usepackage[backend=biber]{biblatex}
          \addbibresource{bib/refs.bib}
          \begin{document}
          Hello, citation: \cite{einstein1905}.
          \printbibliography
          \end{document}
          TEX
          cat > /tmp/biber-fixture/bib/refs.bib <<'BIB'
          @article{einstein1905,
            author = {Einstein, Albert},
            title = {On the electrodynamics of moving bodies},
            journal = {Annalen der Physik},
            year = {1905},
          }
          BIB
          # Echo the fixture so any heredoc/indentation regression is visible in CI logs.
          echo '--- main.tex ---'
          cat /tmp/biber-fixture/main.tex
          echo '--- bib/refs.bib ---'
          cat /tmp/biber-fixture/bib/refs.bib
          (cd /tmp/biber-fixture && zip -r /tmp/biber.zip .)
          latex2arxiv /tmp/biber.zip /tmp/biber_arxiv.zip --compile
          test -f /tmp/biber_arxiv.pdf
          test "$(stat -c%s /tmp/biber_arxiv.pdf)" -gt 5000

  action-smoke:
    # Smoke-tests action.yml against fixture projects.
    # We pre-install latex2arxiv from local source so the action's own
    # `pip install latex2arxiv` step is a no-op — that way we test the
    # composite-action shape against the LOCAL tool, not whatever PyPI
    # currently ships.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install local latex2arxiv (so the action's install becomes a no-op)
        run: pip install .

      - name: Clean fixture should pass
        uses: ./
        with:
          input: tests/fixtures/01-minimal
          main: main.tex

      - name: Error fixture should fail (job must continue to assert)
        id: error-fixture
        uses: ./
        with:
          input: tests/fixtures/05-pre-flight-warnings
          main: main.tex
        continue-on-error: true

      - name: Verify error fixture exited non-zero
        run: |
          if [ "${{ steps.error-fixture.outcome }}" != "failure" ]; then
            echo "Expected error fixture to fail (2 [error] lines), but the action succeeded."
            exit 1
          fi
          echo "Error fixture failed as expected."
