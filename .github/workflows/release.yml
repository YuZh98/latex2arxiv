name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Validate version input
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version input '$VERSION' does not match expected format X.Y.Z" >&2
            exit 1
          fi

      - name: Bump version in pyproject.toml
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          branch: release/v${{ github.event.inputs.version }}
          commit-message: "Bump version to ${{ github.event.inputs.version }}"
          title: "Bump version to ${{ github.event.inputs.version }}"
          body: "Automated version bump to ${{ github.event.inputs.version }}. Merge this PR then push the `v${{ github.event.inputs.version }}` tag to trigger PyPI publish."
