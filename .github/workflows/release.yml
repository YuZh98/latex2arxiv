name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Bump version in pyproject.toml
        run: sed -i "s/^version = .*/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ github.event.inputs.version }}
          commit-message: "Bump version to ${{ github.event.inputs.version }}"
          title: "Bump version to ${{ github.event.inputs.version }}"
          body: "Automated version bump to ${{ github.event.inputs.version }}. Merge this PR then push the `v${{ github.event.inputs.version }}` tag to trigger PyPI publish."
