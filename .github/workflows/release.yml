name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Validate version input
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version input '$VERSION' does not match expected format X.Y.Z" >&2
            exit 1
          fi

      - name: Rotate CHANGELOG [Unreleased] -> [VERSION]
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # Safety: refuse to rotate if [VERSION] already exists or if the
          # [Unreleased] section is empty (publish.yml's extractor would emit
          # blank release notes either way). The publish step matches
          # `^## [VERSION]` exactly; this rotation pins that anchor.
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md already has a [${VERSION}] section" >&2
            exit 1
          fi
          # "Empty" = no bullet between [Unreleased] and the next ## heading.
          unreleased_body=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [[ -z "$(echo "$unreleased_body" | grep -E '^[-*]')" ]]; then
            echo "ERROR: CHANGELOG.md [Unreleased] section has no bullets — nothing to release" >&2
            exit 1
          fi
          DATE=$(date -u +%Y-%m-%d)
          # GNU sed (CI is ubuntu-latest) honors \n in the replacement so the
          # rotation lands as two adjacent headers separated by a blank line.
          sed -i "s/^## \[Unreleased\]$/## [Unreleased]\n\n## [${VERSION}] - ${DATE}/" CHANGELOG.md
          echo "Rotated CHANGELOG: new section [${VERSION}] - ${DATE}"

      - name: Bump version in pyproject.toml
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          branch: release/v${{ github.event.inputs.version }}
          commit-message: "Bump version to ${{ github.event.inputs.version }}"
          title: "Bump version to ${{ github.event.inputs.version }}"
          body: "Automated version bump to ${{ github.event.inputs.version }}. Merge this PR then push the `v${{ github.event.inputs.version }}` tag to trigger PyPI publish."
